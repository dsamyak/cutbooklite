# ─── CutBook Lite — Production Override ────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Uses MANAGED external Postgres (Supabase) and Redis (Upstash) — no local DB/Redis

services:
  # Remove local Postgres and Redis in production (use managed services)
  postgres:
    profiles: ["disabled"]

  redis:
    profiles: ["disabled"]

  api:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
